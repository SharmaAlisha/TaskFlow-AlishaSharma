services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow_test
      POSTGRES_PASSWORD: taskflow_test_secret
      POSTGRES_DB: taskflow_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow_test"]
      interval: 3s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
